name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  health-sweep:
    name: Health Sweep (250L rule)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run health sweep
        run: |
          chmod +x core/infra/health_sweep.sh
          bash core/infra/health_sweep.sh .
        continue-on-error: false

  lint-sql:
    name: Validate SQL structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check SQL files exist and are non-empty
        run: |
          find blueprints/ core/migrations/sql/ -name "*.sql" 2>/dev/null | while read f; do
            lines=$(wc -l < "$f")
            echo "  $f → ${lines}L"
            if [ "$lines" -gt 250 ]; then
              echo "ERROR: $f supera 250 líneas"
              exit 1
            fi
          done

  validate-migrations:
    name: Validate migration sequence
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check migrations are ordered and non-empty
        run: |
          PREV=0
          for f in $(ls core/migrations/sql/*.sql 2>/dev/null | sort); do
            NUM=$(basename "$f" | grep -o '^[0-9]*' | sed 's/^0*//')
            [ -z "$NUM" ] && NUM=0
            if [ "$NUM" -le "$PREV" ]; then
              echo "ERROR: secuencia rota en $f (esperado > $PREV)"
              exit 1
            fi
            lines=$(wc -l < "$f")
            [ "$lines" -eq 0 ] && echo "ERROR: $f vacío" && exit 1
            echo "  ✅ $f (${lines}L)"
            PREV=$NUM
          done

  validate-structure:
    name: Validate repo structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check required files
        run: |
          for f in CLAUDE.md README.md .gitignore docs/index.html inject.sh \
                   core/MAP.json \
                   core/infra/health_sweep.sh core/automation/zen_sequence.sh \
                   core/automation/log_append.sh core/automation/config.json.example \
                   core/migrations/runner.sh \
                   blueprints/base/000_init.sql blueprints/base/004_schema_versions.sql \
                   blueprints/auth/auth.flow.sql blueprints/auth/oauth.service.sql \
                   blueprints/users/001_users.sql blueprints/users/member_management.sql \
                   blueprints/billing/billing.service.sql blueprints/billing/stripe.webhooks.sql \
                   blueprints/health-base/health.sql \
                   blueprints/seed/seed.sql \
                   blueprints/rate-limit/rate_limit.sql \
                   blueprints/rate-limit/rate_limit_cleanup.sql \
                   blueprints/audit/audit.sql \
                   blueprints/onboarding/onboarding.sql \
                   blueprints/notifications/notifications.sql \
                   blueprints/api-keys/api_keys.sql \
                   blueprints/dashboard/dashboard.sql \
                   blueprints/auth/auth.service.sql blueprints/auth/auth.context.sql \
                   blueprints/utils/helpers.sql \
                   active_project/blueprints.json \
                   docker-compose.yml .env.example \
                   core/infra/pg_cron_init.sql \
                   ideas/backlog.md; do
            [ -f "$f" ] && echo "✅ $f" || (echo "❌ $f MISSING" && exit 1)
          done

  integration-test:
    name: Integration test (PostgreSQL real)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: hydra_test
          POSTGRES_USER: hydra
          POSTGRES_PASSWORD: hydra
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Install psql client
        run: sudo apt-get install -y postgresql-client
      - name: Run all migrations
        env:
          DATABASE_URL: postgres://hydra:hydra@localhost:5432/hydra_test
        run: bash core/migrations/runner.sh
      - name: Load seed data
        env:
          PGPASSWORD: hydra
        run: psql -h localhost -U hydra -d hydra_test -f blueprints/seed/seed.sql
      - name: Smoke test — health_check()
        env:
          PGPASSWORD: hydra
        run: |
          result=$(psql -h localhost -U hydra -d hydra_test -t -c "SELECT health_check()->'status';")
          echo "health_check status: $result"
          echo "$result" | grep -q '"ok"' || (echo "ERROR: health_check failed" && exit 1)
      - name: Smoke test — check_rate_limit()
        env:
          PGPASSWORD: hydra
        run: |
          result=$(psql -h localhost -U hydra -d hydra_test -t -c \
            "SELECT check_rate_limit('00000000-0000-0000-0000-000000000001'::UUID, 'test/endpoint')->'allowed';")
          echo "check_rate_limit allowed: $result"
          echo "$result" | grep -q 'true' || (echo "ERROR: rate limit check failed" && exit 1)
      - name: Smoke test — run_all_cleanups()
        env:
          PGPASSWORD: hydra
        run: |
          psql -h localhost -U hydra -d hydra_test -c "SELECT run_all_cleanups();"
      - name: Smoke test — org_dashboard()
        env:
          PGPASSWORD: hydra
        run: |
          result=$(psql -h localhost -U hydra -d hydra_test -t -c \
            "SELECT org_dashboard('a0000000-0000-0000-0000-000000000001'::UUID)->'org_name';")
          echo "org_dashboard org_name: $result"
          echo "$result" | grep -q '"' || (echo "ERROR: org_dashboard failed" && exit 1)
